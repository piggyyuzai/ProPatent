<!DOCTYPE html>
<html lang="zh-CN">

    <script src="./scripts/chat.js"></script>
</head>
<body>

<!-- 左侧菜单栏 -->
<div class="sidebar">
    <img src="./asset/logo.png" class="sidebar-logo">
    <div class="sidebar-title">ProPatent</div>
    <div class="sidebar-title">AI专利撰写助手</div>

        <div class="sidebar-menu">我的订单</div>
    </div>
    <!-- 用户信息区 -->
    <div class="user">
        <img src="./asset/user.png" class="user-avatar">
        <div class="user-info">
            <div class="user-name">用户名</div>
            <div class="user-vip">会员到期时间：2024-12-31</div>

    <div class="logout" onclick="">退出登录</div>

<!--历史记录-->
<div class="history-container">
    <div id="new-message" class="message-item">
        <img src="./asset/add.png">

    </div>
    <div class="message-list">
        <div class="message-item" style="background-color:#dbe9fe;">
            <img src="./asset/message.png">
            <div>新的对话</div>
        </div>
        <div class="message-item">
            <img src="./asset/message.png">

        </div>
        <div class="message-item">
            <img src="./asset/message.png">

        </div>
    </div>

</div>


<!-- 右侧对话窗口 -->
<div class="chat-container">
    <!--消息框-->
    <div class="chat-box" id="chat-box"></div>
    <div class="input-container">
        <textarea id="user-input" placeholder="请输入文字..." oninput="adjustHeight(this)"></textarea>
        <button id="send-button" onclick="sendMessage()">发 送</button>
    </div>

</div>
